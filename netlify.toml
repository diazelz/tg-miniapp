# Netlify: статический сайт из webapp + serverless-функция бота из netlify/functions.
# base не задаём (корень). Python-бот лежит в bot/, поэтому в корне нет
# requirements.txt и Netlify не пытается ставить Python-зависимости.
[build]
  publish = "webapp"
  functions = "netlify/functions"
  command = ""
