<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Mini App</title>

  <!-- Официальный SDK Telegram Mini Apps. Даёт объект window.Telegram.WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      /* Цвета берём из темы Telegram — приложение подстраивается под тему юзера */
      --bg: var(--tg-theme-bg-color, #0f1115);
      --text: var(--tg-theme-text-color, #ffffff);
      --hint: var(--tg-theme-hint-color, #8a8f98);
      --accent: var(--tg-theme-button-color, #2ea6ff);
      --accent-text: var(--tg-theme-button-text-color, #ffffff);
      --card: var(--tg-theme-secondary-bg-color, #1a1d24);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    body {
      /* Занимаем весь экран, учитываем «чёлку» и safe-area телефона */
      min-height: 100vh;
      padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .hero {
      margin-top: 8px;
    }
    .hero h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
    .hero p  { margin-top: 8px; color: var(--hint); font-size: 15px; line-height: 1.5; }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 20px;
    }
    .card h2 { font-size: 15px; color: var(--hint); font-weight: 500; margin-bottom: 10px; }
    .row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 15px; }
    .row span:last-child { color: var(--hint); }

    .counter {
      display: flex; align-items: center; justify-content: center; gap: 24px;
      font-size: 20px; font-weight: 600;
    }
    .counter button {
      width: 52px; height: 52px; border-radius: 50%;
      border: none; font-size: 26px; cursor: pointer;
      background: var(--accent); color: var(--accent-text);
    }
    .counter #value { min-width: 48px; text-align: center; font-size: 30px; }

    .spacer { flex: 1; }

    .primary {
      width: 100%; padding: 16px; border: none; border-radius: 14px;
      background: var(--accent); color: var(--accent-text);
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1 id="greeting">Mini App работает 👋</h1>
    <p>Это полноэкранное окно внутри Telegram. Отсюда можно строить что угодно — магазин, портфолио, игру.</p>
  </div>

  <div class="card">
    <h2>Данные из Telegram</h2>
    <div class="row"><span>Пользователь</span><span id="username">—</span></div>
    <div class="row"><span>Язык</span><span id="lang">—</span></div>
    <div class="row"><span>Платформа</span><span id="platform">—</span></div>
    <div class="row"><span>Тема</span><span id="theme">—</span></div>
  </div>

  <div class="card">
    <h2>Пример интерактива</h2>
    <div class="counter">
      <button id="minus">−</button>
      <span id="value">0</span>
      <button id="plus">+</button>
    </div>
  </div>

  <div class="spacer"></div>

  <button class="primary" id="close">Готово</button>

  <script>
    const tg = window.Telegram.WebApp;

    // Сообщаем Telegram, что приложение готово, и разворачиваем на весь экран
    tg.ready();
    tg.expand();

    // Данные пользователя (если Telegram их передал)
    const user = tg.initDataUnsafe?.user;
    if (user) {
      document.getElementById("greeting").textContent =
        `Привет, ${user.first_name}! 👋`;
      document.getElementById("username").textContent =
        user.username ? "@" + user.username : user.first_name;
      document.getElementById("lang").textContent = user.language_code || "—";
    }
    document.getElementById("platform").textContent = tg.platform || "—";
    document.getElementById("theme").textContent = tg.colorScheme || "—";

    // Простой счётчик с тактильной отдачей
    let count = 0;
    const value = document.getElementById("value");
    const buzz = () => tg.HapticFeedback?.impactOccurred("light");
    document.getElementById("plus").onclick  = () => { value.textContent = ++count; buzz(); };
    document.getElementById("minus").onclick = () => { value.textContent = --count; buzz(); };

    // Кнопка «Готово» закрывает Mini App
    document.getElementById("close").onclick = () => tg.close();
  </script>
</body>
</html>
